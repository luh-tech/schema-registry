name: Deploy schemas to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'schemas/**'
      - 'CNAME'
      - '.nojekyll'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout schema-registry
        uses: actions/checkout@v4
        with:
          path: schema-registry

      - name: Checkout ectropy-ai/schemas
        uses: actions/checkout@v4
        with:
          repository: ectropy-ai/schemas
          ref: main
          path: ectropy-schemas
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stage artifact (schemas/ contents + CNAME + .nojekyll at site root)
        run: |
          mkdir -p _site _site/ectropy
          cp -r schema-registry/schemas/. _site/
          # EA schemas → _site/ectropy/, honoring ectropy-ai/schemas/.deployignore
          rsync -a --exclude-from='ectropy-schemas/.deployignore' ectropy-schemas/ _site/ectropy/
          # Leak-guard: fail the build if any gated path reached the artifact
          for p in decision/sdi-snapshot.schema.json \
                   decision/success-pattern.schema.json \
                   efas/eigenmode-forecast.schema.json; do
            if [ -e "_site/ectropy/$p" ]; then echo "::error::LEAK _site/ectropy/$p"; exit 1; fi
          done
          # Hygiene-guard: repo internals must not publish
          for p in .git node_modules package.json tsconfig.json tests; do
            if [ -e "_site/ectropy/$p" ]; then echo "::error::INTERNAL-LEAK _site/ectropy/$p"; exit 1; fi
          done
          cp schema-registry/CNAME _site/CNAME
          cp schema-registry/.nojekyll _site/.nojekyll
          echo "--- staged artifact ---"
          ls -la _site/ | head -30
          echo "--- _site file count ---"
          find _site -type f | wc -l

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
