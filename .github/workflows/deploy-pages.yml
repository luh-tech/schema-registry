name: Deploy schemas to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'schemas/**'
      - 'CNAME'
      - '.nojekyll'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stage artifact (schemas/ contents + CNAME + .nojekyll at site root)
        run: |
          mkdir -p _site
          cp -r schemas/. _site/
          cp CNAME _site/CNAME
          cp .nojekyll _site/.nojekyll
          echo "--- staged artifact ---"
          ls -la _site/ | head -30
          echo "--- _site file count ---"
          find _site -type f | wc -l

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
